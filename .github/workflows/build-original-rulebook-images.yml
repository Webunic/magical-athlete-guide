name: Build original rulebook images

on:
  push:
    branches:
      - hotfix/original-rulebook-images
    paths:
      - scripts/build_original_rulebook_images.py
      - .github/workflows/build-original-rulebook-images.yml

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: hotfix/original-rulebook-images
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install renderer
        run: python -m pip install --disable-pip-version-check pymupdf requests

      - name: Render lossless PNG assets
        run: python scripts/build_original_rulebook_images.py

      - name: Verify asset set
        run: |
          test "$(find assets/cards -maxdepth 1 -name '*.png' | wc -l)" -eq 36
          python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('assets/cards/manifest.json').read_text())
          assert manifest['lossless'] is True
          assert len(manifest['cards']) == 36
          assert all(v['width'] >= 900 and v['height'] >= 490 for v in manifest['cards'].values())
          print('Verified 36 lossless rulebook renders')
          PY

      - name: Commit generated assets to hotfix branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/cards
          if git diff --cached --quiet; then
            echo "Assets are already current"
          else
            git commit -m "Add lossless original rulebook card images"
            git push origin HEAD:hotfix/original-rulebook-images
          fi
