name: Validate original card sprite

on:
  push:
    branches: [fix/original-card-sprite]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct and validate source JPEG
        shell: python
        run: |
          import base64, hashlib, pathlib, struct

          parts = [pathlib.Path(f"assets/sprite-candidate-{i:02}.txt").read_text().strip() for i in range(1, 6)]
          payload = base64.b64decode("".join(parts), validate=True)
          pathlib.Path("cards-sprite-restored.jpg").write_bytes(payload)

          def jpeg_size(data):
              if not data.startswith(b"\xff\xd8"):
                  raise SystemExit("not a JPEG")
              i = 2
              while i < len(data):
                  if data[i] != 0xFF:
                      i += 1
                      continue
                  while i < len(data) and data[i] == 0xFF:
                      i += 1
                  marker = data[i]
                  i += 1
                  if marker in (0xD8, 0xD9):
                      continue
                  length = struct.unpack(">H", data[i:i+2])[0]
                  if marker in range(0xC0, 0xC4):
                      height, width = struct.unpack(">HH", data[i+3:i+7])
                      return width, height
                  i += length
              raise SystemExit("JPEG dimensions not found")

          digest = hashlib.sha256(payload).hexdigest()
          width, height = jpeg_size(payload)
          print(f"bytes={len(payload)} sha256={digest} dimensions={width}x{height}")
          assert len(payload) == 294075, len(payload)
          assert digest == "ec6c1434b4f55f15cabf3254bae715be53e54efe12a4c271a356b2ee988b26a3", digest
          assert (width, height) == (2160, 1140), (width, height)
