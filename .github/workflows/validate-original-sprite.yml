name: Validate original card sprite

on:
  push:
    branches: [fix/original-card-sprite]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct candidate JPEG
        shell: python
        run: |
          import base64, hashlib, json, pathlib, struct

          parts = [pathlib.Path(f"assets/sprite-candidate-{i:02}.txt").read_text().strip() for i in range(1, 6)]
          joined = "".join(parts)
          payload = base64.b64decode(joined)
          pathlib.Path("cards-sprite-restored.jpg").write_bytes(payload)

          def jpeg_size(data):
              if not data.startswith(b"\xff\xd8"):
                  return None
              i = 2
              while i + 9 < len(data):
                  if data[i] != 0xFF:
                      i += 1
                      continue
                  while i < len(data) and data[i] == 0xFF:
                      i += 1
                  marker = data[i]
                  i += 1
                  if marker in (0xD8, 0xD9):
                      continue
                  if i + 2 > len(data):
                      break
                  length = struct.unpack(">H", data[i:i+2])[0]
                  if marker in range(0xC0, 0xC4) and i + 7 <= len(data):
                      height, width = struct.unpack(">HH", data[i+3:i+7])
                      return [width, height]
                  i += length
              return None

          metadata = {
              "base64_chars": len(joined),
              "bytes": len(payload),
              "sha256": hashlib.sha256(payload).hexdigest(),
              "dimensions": jpeg_size(payload),
          }
          pathlib.Path("sprite-metadata.json").write_text(json.dumps(metadata, indent=2))
          print(json.dumps(metadata))
      - uses: actions/upload-artifact@v4
        with:
          name: restored-sprite-candidate
          path: |
            cards-sprite-restored.jpg
            sprite-metadata.json
      - name: Validate exact original bytes
        shell: python
        run: |
          import hashlib, json, pathlib
          payload = pathlib.Path("cards-sprite-restored.jpg").read_bytes()
          metadata = json.loads(pathlib.Path("sprite-metadata.json").read_text())
          assert len(payload) == 294075, metadata
          assert hashlib.sha256(payload).hexdigest() == "ec6c1434b4f55f15cabf3254bae715be53e54efe12a4c271a356b2ee988b26a3", metadata
          assert metadata["dimensions"] == [2160, 1140], metadata
