<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="theme-color" content="#f3efe5"><link rel="manifest" href="manifest.webmanifest"><title>Magical Athlete</title><style>:root{--bg:#f3efe5;--panel:#fffaf0;--ink:#241d1a;--muted:#756b63;--line:#d8c9b6;--accent:#b72d3c}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}header{position:sticky;top:0;z-index:5;padding:max(14px,env(safe-area-inset-top)) 14px 12px;background:rgba(243,239,229,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}h1{margin:0 0 10px;font-size:28px}input{width:100%;font-size:16px;padding:13px 14px;border:1px solid var(--line);border-radius:13px;background:var(--panel);color:var(--ink)}.toolbar{display:flex;gap:8px;margin-top:9px;overflow:auto;padding-bottom:1px}button{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:12px;padding:10px 12px;font-weight:700;font-size:14px;white-space:nowrap}.active,.pin.on{background:var(--accent);color:#fff;border-color:var(--accent)}main{padding:16px 14px calc(30px + env(safe-area-inset-bottom));max-width:900px;margin:auto}.summary{color:var(--muted);margin:0 0 14px}.section-title{display:flex;align-items:center;gap:8px;margin:18px 0 10px}.badge{background:var(--accent);color:#fff;border-radius:99px;padding:3px 8px;font-weight:800}.grid{display:grid;gap:12px}.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 5px 18px rgba(0,0,0,.05)}.top{display:flex;gap:10px;justify-content:space-between;align-items:flex-start}h2{margin:0;font-size:21px}small{display:block;color:var(--muted);font-size:13px;margin-top:3px}.pin{padding:8px 10px}.label{font-size:10px;font-weight:800;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;margin-top:12px}p{margin:5px 0 0;line-height:1.42}.original{font-style:italic;color:#514843}.empty{color:var(--muted);padding:8px 0}.hidden{display:none}@media(min-width:720px){.grid{grid-template-columns:1fr 1fr}}</style></head><body><header><h1>Magical Athlete</h1><input id="q" type="search" placeholder="Поиск по названию или способности"><div class="toolbar"><button id="all" class="active">Все карты</button><button id="game">Только в игре</button><button id="clear">Сбросить выбор</button></div></header><main><p class="summary" id="summary"></p><section><div class="section-title"><h2>Участвуют в игре</h2><span class="badge" id="pc">0</span></div><div class="grid" id="pinned"></div></section><section><div class="section-title"><h2>Все гонщики</h2></div><div class="grid" id="cards"></div></section></main><script>const DATA=[['Alchemist','Алхимик','When I roll a 1 or 2 for my main move, I can move 4 instead.','Когда для моего основного перемещения выпадает 1 или 2, я могу вместо этого переместиться на 4 клетки.'],['Blimp','Дирижабль','When I start my turn before the second corner of the track, I get +3 to my main move. On or after that corner, I get -1.','Если в начале хода я нахожусь до второго поворота трассы, я получаю +3 к основному перемещению. На втором повороте или после него я получаю -1.'],['Coach','Тренер','Everyone on my space gets +1 to their main move, including me.','Все гонщики на моей клетке получают +1 к основному перемещению, включая меня.'],['Baba Yaga','Баба-яга','Trip any racer that stops on my space, or when I stop on theirs.','Любой гонщик, остановившийся на моей клетке, спотыкается. Гонщик также спотыкается, когда я останавливаюсь на его клетке.'],['Centaur','Кентавр','When I pass a racer, they move -2.','Когда я обгоняю гонщика, он перемещается на 2 клетки назад.'],['Copycat','Подражатель','I have the power of the racer currently in the lead. If there is a tie, I pick.','Я обладаю способностью гонщика, который сейчас лидирует. Если лидеров несколько, я выбираю одного из них.'],['Banana','Банан','I trip any racer that passes me.','Любой гонщик, который обгоняет меня, спотыкается.'],['Cheerleader','Чирлидер','Before my main move, I can make the racer(s) in last place move 2. If I do, I move 1.','Перед основным перемещением я могу передвинуть гонщика или гонщиков на последнем месте на 2 клетки. Если я это делаю, то перемещаюсь на 1 клетку.'],['Dicemonger','Кубикодел','Anyone can reroll their main move once per turn. When another racer does it, I move 1.','Каждый гонщик может один раз за ход перебросить свой основной бросок. Когда другой гонщик делает это, я перемещаюсь на 1 клетку.'],['Duelist','Дуэлянт','Whenever a racer shares my space, I can shout DUEL! We roll our dice and whoever rolls highest moves 2. I win ties.','Когда другой гонщик оказывается со мной на одной клетке, я могу объявить дуэль. Мы бросаем кубики; тот, у кого результат выше, перемещается на 2 клетки. При ничьей побеждаю я.'],['Genius','Гений','I can predict what number I will roll for my main move. If I am right, I take another turn after this one.','Я могу предсказать результат своего основного броска. Если угадываю, после этого хода получаю ещё один ход.'],['Heckler','Насмешник','When a racer ends their turn within 1 space of where they started, I move 2.','Когда гонщик заканчивает ход не дальше чем в 1 клетке от места, где начал его, я перемещаюсь на 2 клетки.'],['Egg','Яйцо','Before my race, draw 3 new racers from the deck and pick one. I have its powers.','Перед своей гонкой возьмите из колоды 3 новых гонщиков и выберите одного. Я получаю его способности.'],['Gunk','Слизь','Other racers get -1 to their main move.','Другие гонщики получают -1 к основному перемещению.'],['Huge Baby','Огромный младенец','No one can ever be on my space, besides the Start. Whenever that would happen, put the racer on the space behind me instead.','Никто не может находиться со мной на одной клетке, кроме старта. Когда это должно произойти, вместо этого поставьте гонщика на клетку позади меня.'],['Flip Flop','Шлёп-шлёп','I can skip rolling for my main move and swap spaces with another racer instead.','Я могу не бросать кубик для основного перемещения и вместо этого поменяться клетками с другим гонщиком.'],['Hare','Заяц','I get +2 to my main move. When I start my turn alone in the lead, I skip my main move.','Я получаю +2 к основному перемещению. Если начинаю ход единоличным лидером, я пропускаю основное перемещение.'],['Hypnotist','Гипнотизёр','Before my main move, I can warp a racer to my space.','Перед основным перемещением я могу телепортировать любого гонщика на свою клетку.'],['Inchworm','Гусеница','When another racer rolls a 1 for their main move, they skip that move and I move 1.','Когда другой гонщик выбрасывает 1 для основного перемещения, он пропускает это перемещение, а я перемещаюсь на 1 клетку.'],['Legs','Ноги','I can skip rolling for my main move and move 5 instead.','Я могу не бросать кубик для основного перемещения и вместо этого переместиться на 5 клеток.'],['Mastermind','Гениальный стратег','At the start of my first turn, I predict which racer will win. If I am right, the race ends immediately and I finish 2nd.','В начале своего первого хода я предсказываю победителя гонки. Если угадываю, гонка немедленно заканчивается, а я занимаю второе место.'],['Lackey','Лакей','When another racer rolls a 6 for their main move, I move 2 before they move.','Когда другой гонщик выбрасывает 6 для основного перемещения, я перемещаюсь на 2 клетки до того, как двинется он.'],['Lovable Loser','Обаятельный неудачник','Before my main move, I get 1 point chip if I am alone in last place.','Перед основным перемещением я получаю жетон в 1 очко, если единолично занимаю последнее место.'],['M.O.U.T.H.','П.А.С.Т.Ь.','When I stop on a space with exactly one other racer, they are eliminated from the race.','Когда я останавливаюсь на клетке ровно с одним другим гонщиком, он выбывает из гонки.'],['Leaptoad','Прыгун','While moving, I skip spaces with other racers on them.','Во время перемещения я пропускаю клетки, занятые другими гонщиками.'],['Magician','Фокусник','I can reroll my main move up to two times.','Я могу перебросить свой основной бросок до двух раз.'],['Party Animal','Душа компании','Before my main move, all racers move 1 space towards me. Each other racer on my space gives me +1 to my main move.','Перед основным перемещением все гонщики перемещаются на 1 клетку в мою сторону. Каждый другой гонщик на моей клетке даёт мне +1 к основному перемещению.'],['Rocket Scientist','Ракетостроитель','When I roll for my main move, I can move double that number. If I do, I trip.','После основного броска я могу переместиться на удвоенное выпавшее число клеток. Если делаю это, то спотыкаюсь.'],['Sisyphus','Сизиф','Before my race, I take 4 point chips. When I roll a 6 for my main move, instead of moving, I warp to the Start and lose 1 point chip.','Перед своей гонкой я беру 4 жетона по 1 очку. Когда для основного перемещения выпадает 6, вместо движения я телепортируюсь на старт и теряю 1 жетон.'],['Suckerfish','Прилипала','When a racer on my space moves, I can move to their new space.','Когда гонщик на моей клетке перемещается, я могу переместиться вместе с ним на его новую клетку.'],['Romantic','Романтик','When anyone stops on a space with exactly one other racer, I move 2.','Когда кто-либо останавливается на клетке ровно с одним другим гонщиком, я перемещаюсь на 2 клетки.'],['Skipper','Шкипер','When anyone rolls a 1 for their main move, I go next in turn order.','Когда кто-либо выбрасывает 1 для основного перемещения, следующим в порядке хода становлюсь я.'],['Third Wheel','Третий лишний','Before my main move, I can warp to any space with exactly 2 racers on it.','Перед основным перемещением я могу телепортироваться на любую клетку, где находятся ровно 2 гонщика.'],['Scoocher','Протискивающийся','When another racer power happens, I move 1.','Когда срабатывает способность другого гонщика, я перемещаюсь на 1 клетку.'],['Stickler','Буквоед','Other racers can only cross the finish line by moving the exact amount they need. If they overshoot, they do not move.','Другие гонщики могут пересечь финиш только при точном количестве движения. Если результат превышает необходимое, они не перемещаются.'],['Twin','Близнец','Before my race, I can pick a racer who won a previous race and race with their powers.','Перед своей гонкой я могу выбрать гонщика, победившего в одной из предыдущих гонок, и участвовать со всеми его способностями.']].map(x=>({en:x[0],ru:x[1],original:x[2],translation:x[3]}));let mode='all';let picked=new Set(JSON.parse(localStorage.getItem('ma-picked')||'[]'));const q=document.getElementById('q'),cards=document.getElementById('cards'),pinned=document.getElementById('pinned'),summary=document.getElementById('summary'),pc=document.getElementById('pc');function norm(s){return(s||'').toLocaleLowerCase().replaceAll('ё','е')}function card(c){let a=document.createElement('article');a.className='card';a.innerHTML=`<div class="top"><h2>${c.ru}<small>${c.en}</small></h2><button class="pin ${picked.has(c.en)?'on':''}">${picked.has(c.en)?'✓ В игре':'＋ В игру'}</button></div><div class="label">Оригинал</div><p class="original">${c.original}</p><div class="label">Перевод</div><p>${c.translation}</p>`;a.querySelector('.pin').onclick=()=>toggle(c.en);return a}function toggle(id){picked.has(id)?picked.delete(id):picked.add(id);localStorage.setItem('ma-picked',JSON.stringify([...picked]));render()}function render(){let s=norm(q.value),shown=0;cards.innerHTML='';pinned.innerHTML='';DATA.forEach(c=>{if(picked.has(c.en))pinned.appendChild(card(c));let hit=norm(c.en+' '+c.ru+' '+c.original+' '+c.translation).includes(s);if(hit&&(mode==='all'||picked.has(c.en))){cards.appendChild(card(c));shown++}});if(!pinned.children.length)pinned.innerHTML='<div class="empty">Нажмите «＋ В игру» на нужных карточках.</div>';pc.textContent=picked.size;summary.textContent=`Показано: ${shown} из ${DATA.length}`;document.getElementById('all').classList.toggle('active',mode==='all');document.getElementById('game').classList.toggle('active',mode==='game')}q.oninput=render;document.getElementById('all').onclick=()=>{mode='all';render()};document.getElementById('game').onclick=()=>{mode='game';render()};document.getElementById('clear').onclick=()=>{picked.clear();localStorage.removeItem('ma-picked');render()};if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});render();</script></body></html>
